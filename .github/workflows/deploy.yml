name: Build and Push to Azure ACR

on:
  push:
    branches:
      - main  # Triggers the build every time you push code to main

jobs:
  build-and-push:
    runs-on: ubuntu-latest  # Natively uses standard linux/amd64 hardware!
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: betaregistrysatnam.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and Push Intel/Linux Image
      run: |
        docker build --platform linux/amd64 -t betaregistrysatnam.azurecr.io/beta-backend:v1 .
        docker push betaregistrysatnam.azurecr.io/beta-backend:v1
