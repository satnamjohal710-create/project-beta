 build_and_deploy_job:
  if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event_action != 'closed')
  runs-on: ubuntu-latest
  name: Build and Deploy Job
   steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 1. Clean Monorepo Build Step: Install and build right inside beta-frontend
      - name: Install Dependencies & Build Frontend
        run: |
          npm install
          npm run build
        working-directory: "./beta-frontend"

      # 2. Azure Deployment Step: Direct Azure straight to the generated dist folder
      - name: Deploy to Azure SWA
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
###### Production App Configurations ######
          app_location: "/beta-frontend"
          api_location: ""
          app_artifact_location: "beta-frontend/dist" # 🌟 Notice we added 'beta-frontend/' right here!
          ###### End of App Configurations ######