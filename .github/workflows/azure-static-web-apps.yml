name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event_action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 1. Monorepo Build Step: Run natively inside your true beta-frontend folder
      - name: Install Dependencies & Build Frontend
        run: |
          npm install
          npm run build
          mv dist ../vite
        working-directory: "./beta-frontend" # 🌟 Directs GitHub to step inside your true React/Vite source folder

      # 2. Azure Deployment Step: Uploads our manually created 'vite' artifact folder
      - name: Deploy to Azure SWA
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          ###### Production App Configurations ######
          app_location: "/beta-frontend"     # 🌟 Points directly to your frontend code directory
          api_location: ""                   # Empty because backend is hosted separately
          output_location: "vite"            # Matches the target folder name Azure portal expects
          skip_app_build: true               # Instructs Azure to bypass Oryx and use our pre-built assets
          ###### End of App Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event_action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"