name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 1. Clean Monorepo Build Step: Build inside beta-frontend, then copy 'dist' to the root
      - name: Install Dependencies & Build Frontend
        run: |
          npm install
          npm run build
          cp -r dist ../dist  # 🌟 This copies the compiled assets folder up to the absolute root!
        working-directory: "./beta-frontend"

      # 2. Azure Deployment Step: Direct Azure to the clean root asset folder
      - name: Deploy to Azure SWA
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          ###### Production App Configurations ######
          app_location: "/"               # 🌟 Look at the absolute root workspace now
          api_location: ""
          app_artifact_location: "dist"    # 🌟 Point directly to the root dist folder
          skip_app_build: true             # Bypasses Oryx completely
          ###### End of App Configurations ######