name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Deploy to Azure SWA
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          ###### The Clean Monorepo Mapping ######
          app_location: "beta-frontend"       # Points directly to your source subfolder
          api_location: ""                    # Left empty for your standalone backend
          app_artifact_location: "dist"       # Tells Azure's compiler where the build output goes
          ###### End of App Configurations ######