name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event_action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 1. Native Build Step: Runs explicitly inside your project subfolder
      - name: Install Dependencies & Build
        run: |
          npm install
          npm run build
          mv dist ../vite
        working-directory: "./project-beta" # Tells GitHub to jump inside your true project folder

      # 2. Azure Deployment Step: Uploads the pre-compiled 'vite' folder
      - name: Deploy to Azure SWA
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          ###### Production App Configurations ######
          app_location: "/project-beta"      # Points to your subfolder identity
          api_location: ""                   # Empty because we are using Container Apps for backend
          output_location: "vite"            # Matches the folder name Azure portal expects
          skip_app_build: true               # Tells Azure to skip Oryx and use our pre-built files
          ###### End of App Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event_action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"