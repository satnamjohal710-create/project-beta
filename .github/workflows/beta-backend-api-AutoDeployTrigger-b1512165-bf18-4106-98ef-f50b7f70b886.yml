name: Trigger auto deployment for beta-backend-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/beta-backend-api-AutoDeployTrigger-b1512165-bf18-4106-98ef-f50b7f70b886.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.BETABACKENDAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.BETABACKENDAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.BETABACKENDAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: betaregistrysatnam.azurecr.io
          registryUsername: ${{ secrets.BETABACKENDAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.BETABACKENDAPI_REGISTRY_PASSWORD }}
          containerAppName: beta-backend-api
          resourceGroup: Project-Beta-RG
          imageToBuild: betaregistrysatnam.azurecr.io/beta-backend-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


